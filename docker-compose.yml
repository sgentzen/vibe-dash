services:
  vibe-dash:
    build: .
    image: vibe-dash:latest
    ports:
      - "3001:3001"
    volumes:
      # Bind-mount the real project DB so the container serves actual data
      # (not an isolated empty named volume). Single-writer only — do not run
      # the direct file-based server/MCP against this file while the container runs.
      - ./vibe-dash.db:/data/vibe-dash.db
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VIBE_DASH_DB=/data/vibe-dash.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/projects').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
