sonar.organization=sgentzen
sonar.projectKey=sgentzen_vibe-dash

# Analyzed source and test roots (must not overlap)
sonar.sources=cli,mcp,server,shared,src
sonar.tests=e2e,tests

# Keep generated/vendored/doc paths out of analysis
sonar.exclusions=**/node_modules/**,dist/**,coverage/**,docs/**,**/*.d.ts

# Coverage produced by `npm run test:coverage` (Vitest v8 -> lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
